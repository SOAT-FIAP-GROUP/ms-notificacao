name: SonarCloud Scan
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=SOAT-FIAP-GROUP_SOAT_Pagamentos \
            -Dsonar.organization=soat-fiap-group \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.exclusions="**/api/controller/**,**/config/**,**/mapper/**,**/gateway/**,**/dto/**,**/entity/**,**/exception/**,**/adapter/**,**/AppConstants.java,**/*Application.java" \
            -Dsonar.coverage.exclusions="**/api/controller/**,**/config/**,**/mapper/**,**/gateway/**,**/dto/**,**/entity/**,**/exception/**,**/adapter/**,**/AppConstants.java,**/*Application.java" \
            -Dsonar.qualitygate.wait=true